<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frutisa: Atrapa la Fruta</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(180deg, #ffefba 0%, #ffb347 100%); overflow: hidden; user-select: none; }
    #game { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    .title { position: absolute; top: 12px; width: 100%; text-align: center; font-size: 2rem; font-weight: bold; color: #6b240c; text-shadow: 2px 2px 0 #fff4d6; z-index: 10; }
    .hud { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(255,255,255,0.75); border: 3px solid #6b240c; border-radius: 18px; padding: 10px 18px; font-size: 1.1rem; font-weight: bold; color: #6b240c; z-index: 10; }
    .basket { position: absolute; bottom: 30px; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; font-size: 3rem; transition: transform 0.05s linear; z-index: 5; filter: drop-shadow(0 6px 4px rgba(0,0,0,0.25)); }
    .falling { position: absolute; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; z-index: 4; }
    .popup { position: absolute; font-size: 1.6rem; font-weight: bold; color: #ffffff; text-shadow: 2px 2px 0 #000; animation: floatUp 0.8s ease-out forwards; z-index: 20; }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.2); } }
    .startScreen, .gameOver { position: absolute; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 30; }
    .panel { background: #fff5d6; border: 5px solid #6b240c; border-radius: 25px; padding: 30px; text-align: center; width: min(90vw, 500px); box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
    button { background: #ff5e57; border: none; color: white; font-size: 1.1rem; font-weight: bold; padding: 14px 22px; border-radius: 16px; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 0 #b92f29; }
  </style>
</head>
<body>
<div id="game">
  <div class="title">🍓 FRUTISA: ATRAPA LA FRUTA 🍍</div>
  <div class="hud">
    <div>Puntos: <span id="score">0</span></div>
    <div>Vidas: <span id="lives">3</span></div>
    <div>Tiempo: <span id="time">30</span></div>
  </div>
  <div id="basket" class="basket">🧺</div>

  <div id="startScreen" class="startScreen">
    <div class="panel">
      <h2>Bienvenido a Frutisa</h2>
      <p>Atrapa frutas 🍓🍍 y evita lo raro 🩴🌶️🥤</p>
      <button id="startBtn">Empezar</button>
    </div>
  </div>

  <div id="gameOver" class="gameOver" style="display:none;">
    <div class="panel">
      <h2>Game Over</h2>
      <p>Puntos: <b id="finalScore">0</b></p>
      <button id="restartBtn">Reintentar</button>
    </div>
  </div>
</div>

<script>
// ===== SONIDOS (Web Audio simple) =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'square';
  gain.gain.value = 0.1;
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function soundGood() {
  playSound(800);
  setTimeout(() => playSound(1200), 50);
}

function soundBad() {
  playSound(200, 0.2);
}

function soundGameOver() {
  playSound(300, 0.3);
  setTimeout(() => playSound(150, 0.4), 150);
}

// ===== GAME =====
const game = document.getElementById('game');
const basket = document.getElementById('basket');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const timeEl = document.getElementById('time');
const finalScoreEl = document.getElementById('finalScore');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOver');

let basketX = window.innerWidth / 2 - 45;
let moveLeft = false;
let moveRight = false;
let score = 0;
let lives = 3;
let timeLeft = 30;
let gameRunning = false;
let fallingItems = [];

const goodItems = [
  { emoji: '🍓', points: 10 },
  { emoji: '🍍', points: 12 },
];

const badItems = [
  { emoji: '🩴' },
  { emoji: '🌶️' },
  { emoji: '🥤' }
];

function spawnItem() {
  const isGood = Math.random() > 0.4;
  const data = isGood ? goodItems[Math.floor(Math.random()*goodItems.length)] : badItems[Math.floor(Math.random()*badItems.length)];

  const el = document.createElement('div');
  el.className = 'falling';
  el.textContent = data.emoji;

  const x = Math.random() * (window.innerWidth - 60);
  el.style.left = x + 'px';
  el.style.top = '-60px';
  game.appendChild(el);

  fallingItems.push({ el, x, y: -60, speed: 3 + Math.random()*2, good: isGood });
}

function gameLoop() {
  if (!gameRunning) return;

  if (moveLeft) basketX -= 7;
  if (moveRight) basketX += 7;
  basketX = Math.max(0, Math.min(window.innerWidth - 90, basketX));
  basket.style.left = basketX + 'px';

  fallingItems.forEach((item, i) => {
    item.y += item.speed;
    item.el.style.top = item.y + 'px';

    if (item.y > window.innerHeight - 120 && item.x < basketX + 90 && item.x + 60 > basketX) {
      if (item.good) {
        score += 10;
        scoreEl.textContent = score;
        soundGood();
      } else {
        lives--;
        livesEl.textContent = lives;
        soundBad();
      }
      item.el.remove();
      fallingItems.splice(i,1);
    }

    if (item.y > window.innerHeight) {
      item.el.remove();
      fallingItems.splice(i,1);
    }
  });

  requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0;
  lives = 3;
  timeLeft = 30;
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  timeEl.textContent = timeLeft;
  startScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';
  gameRunning = true;

  setInterval(spawnItem, 700);

  const timer = setInterval(() => {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0 || lives <= 0) {
      clearInterval(timer);
      gameRunning = false;
      finalScoreEl.textContent = score;
      gameOverScreen.style.display = 'flex';
      soundGameOver();
    }
  }, 1000);

  gameLoop();
}

startBtn.onclick = startGame;
restartBtn.onclick = startGame;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') moveLeft = true;
  if (e.key === 'ArrowRight') moveRight = true;
});

document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft') moveLeft = false;
  if (e.key === 'ArrowRight') moveRight = false;
});
// ===== MUSICA DE FONDO (loop simple) =====
let bgmInterval;
function startBGM(){
  const notes = [523, 659, 784, 659]; // tonito feliz
  let i = 0;
  bgmInterval = setInterval(()=>{
    playSound(notes[i % notes.length], 0.12);
    i++;
  }, 180);
}

function stopBGM(){
  clearInterval(bgmInterval);
}

// ===== HOOKS EXISTENTES =====
const originalStartGame = startGame;
startGame = function(){
  originalStartGame();
  startBGM();
};

// modificar game over para parar música
const originalEndCheck = setInterval;
// parche simple dentro del timer ya existente

// interceptar cuando termina (dentro del timer)
// (ya que no hay función endGame aquí, lo hacemos directo)

// override del timer interno
const oldStartGame = startGame;
startGame = function(){
  score = 0;
  lives = 3;
  timeLeft = 30;
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  timeEl.textContent = timeLeft;
  startScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';
  gameRunning = true;

  setInterval(spawnItem, 700);

  const timer = setInterval(() => {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0 || lives <= 0) {
      clearInterval(timer);
      gameRunning = false;
      finalScoreEl.textContent = score;
      gameOverScreen.style.display = 'flex';
      soundGameOver();
      stopBGM();
    }
  }, 1000);

  startBGM();
  gameLoop();
};

</script>
</body>
</html>
